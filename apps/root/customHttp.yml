version: 1
customHeaders:
  - pattern: "**/*.html"
    headers:
      - key: "Cache-Control"
        value: "public, no-cache, no-store, must-revalidate"

  - pattern: "**/*.js"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"
  - pattern: "**/*.css"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"

  - pattern: "**/*.woff2"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=31536000, immutable"

  - pattern: "**/*.png"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=86400, stale-while-revalidate=3600"
  - pattern: "**/*.jpg"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=86400, stale-while-revalidate=3600"
  - pattern: "**/*.svg"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=86400, stale-while-revalidate=3600"
  - pattern: "**/*.ico"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=86400, stale-while-revalidate=3600"

  - pattern: "**/*"
    headers:
      - key: "X-Frame-Options"
        value: "DENY"
      - key: "X-Content-Type-Options"
        value: "nosniff"
      - key: "Strict-Transport-Security"
        value: "max-age=31536000; includeSubDomains"
