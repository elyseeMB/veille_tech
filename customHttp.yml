applications:
  - appRoot: apps/root
    customHeaders:
      - pattern: "**/*.html"
        headers:
          - key: "Cache-Control"
            value: "public, no-cache, no-store, must-revalidate"
          - key: "X-Frame-Options"
            value: "DENY"
          - key: "Strict-Transport-Security"
            value: "max-age=31536000; includeSubDomains"

      - pattern: "**/*.js"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000, immutable"
          - key: "X-Content-Type-Options"
            value: "nosniff"

      - pattern: "**/*.css"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000, immutable"
          - key: "X-Content-Type-Options"
            value: "nosniff"

      - pattern: "**/*.webmanifest"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=0, must-revalidate"
          - key: "X-Content-Type-Options"
            value: "nosniff"

      - pattern: "**/*.woff2"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000, immutable"

      - pattern: "**/*.{png,jpg,jpeg,svg,ico}"
        headers:
          - key: "Cache-Control"
            value: "public, max-age=86400, stale-while-revalidate=3600"
