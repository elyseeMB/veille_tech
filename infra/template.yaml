AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 300
    MemorySize: 128
  HttpApi:
    CorsConfiguration:
      AllowOrigins:
        - "https://veille.safecoffi.app"
        - "https://beta.veille.safecoffi.app"
      AllowMethods:
        - GET
        - OPTIONS
      AllowHeaders:
        - Content-Type
        - Authorization
    DefaultRouteSettings:
      ThrottlingBurstLimit: 200
      ThrottlingRateLimit: 100

Resources:
  FetcherFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: veille-fetcher
      CodeUri: ../lambdas/fetcher
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      MemorySize: 256
      Environment:
        Variables:
          DB_PARAM_NAME: "/veille/database_url"
          YT_PARAM_NAME: "/veille/youtube_api_key"
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0/30 7-18 ? * MON-FRI *)
            Name: tech-watch-weekday-30min
            Enabled: true
        WeekendSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 9-18 ? * SAT-SUN *)
            Name: tech-watch-weekend-1h
            Enabled: true
        NightSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 19,23,3 ? * * *)
            Name: tech-watch-night-4h
            Enabled: true

  GatewayFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: veille-gateway
      CodeUri: ../lambdas/server
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Timeout: 30
      Environment:
        Variables:
          DB_PARAM_NAME: "/veille/database_url"
          GIN_MODE: "release"
          ALLOWED_ORIGINS: '["https://veille.safecoffi.app", "https://beta.veille.safecoffi.app"]'
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # ArchiverFunction:
  #   Type: AWS::Serverless::Function
  #   Metadata:
  #     BuildMethod: makefile
  #   Properties:
  #     FunctionName: veille-archiver
  #     CodeUri: ../lambdas/archiver
  #     Handler: bootstrap
  #     Runtime: provided.al2023
  #     Architectures:
  #       - x86_64
  #     MemorySize: 256
  #     Timeout: 300
  #     Environment:
  #       Variables:
  #         DB_PARAM_NAME: "/veille/database_url"
  #     Policies:
  #       - SSMParameterReadPolicy:
  #           ParameterName: "veille/*"
  #     Events:
  #       DailySchedule:
  #         Type: Schedule
  #         Properties:
  #           Schedule: cron(0 3 ? * * *)
  #           Name: archiver-daily
  #           Enabled: true

  ClusteringFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: Dockerfile
      DockerContext: ../services/clustering
      DockerTag: latest
    Properties:
      FunctionName: veille-clustering
      PackageType: Image
      Architectures:
        - x86_64
      MemorySize: 2048
      Timeout: 900
      Environment:
        Variables:
          ENVIRONMENT: "production"
          YOUTUBE_SCRAPING: "false"
          USE_MOCK: "false"
          NAMER_PROVIDER: "gemini"
          CF_GATEWAY_NAME: "default"
          DB_PARAM_NAME: "/veille/database_url"
          CF_ACCOUNT_ID: "/veille/cf_account_id"
          CF_API_TOKEN: "/veille/cf_api_token"
          CF_API_TOKEN_GATEWAY: "/veille/cf_api_token_gateway"
          GEMINI_API_KEY: "/veille/gemini_api_key"
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        MorningSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 ? * * *)
            Name: clustering-morning
            Enabled: true
