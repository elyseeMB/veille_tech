AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 300
    MemorySize: 128

Resources:
  # ─── Lambda Fetcher RSS + YouTube ───────────────────────────────
  FetcherFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: veille-fetcher
      CodeUri: ../apps/fetcher/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Environment:
        Variables:
          DATABASE_URL: !Sub "{{resolve:ssm:/veille/database_url}}"
          YOUTUBE_API_KEY: !Sub "{{resolve:ssm:/veille/youtube_api_key}}"
      Events:
        ScheduledFetch:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: veille-fetch-schedule
            Enabled: true

