AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Resources:
  VeilleTechApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: veille-tech-api
      CodeUri: ../apps/api/dist
      Handler: dist/index.handler
      Runtime: nodejs22.x
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: $default
            Method: ANY
