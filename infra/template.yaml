AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 300
    MemorySize: 128

Resources:
  # ─── Lambda Fetcher RSS + YouTube ───────────────────────────────
  FetcherFunction:
    Type: AWS::Serverless::Function
    # Metadata:
    #   BuildMethod: makefile
    Properties:
      FunctionName: veille-fetcher
      CodeUri: ../apps/fetcher/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Environment:
        Variables:
          DB_PARAM_NAME: "/veille/database_url"
          YT_PARAM_NAME: "/veille/youtube_api_key"
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        WeeklySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0/30 7-18 ? * MON-FRI *)
            Name: tech-watch-weekday-30min
            Enabled: true
        WeekendSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 9-20 ? * SAT-SUN *)
            Name: tech-watch-weekend-1h
            Enabled: true
        NightSchedule:
          Type: Schedule
          Properties:
            Schedule: rate(4 hours)
            Name: tech-watch-night-4h
            Enabled: true

  # ─── Lambda Gateway API (à venir) ───────────────────────────────
  GatewayFunction:
    Type: AWS::Serverless::Function
    # Metadata:
    #   BuildMethod: makefile
    Properties:
      FunctionName: veille-gateway
      CodeUri: ../apps/gateway/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Environment:
        Variables:
          DB_PARAM_NAME: "/veille/database_url"
          GIN_MODE: "release"
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
