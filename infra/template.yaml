AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Globals:
  Function:
    Timeout: 300
    MemorySize: 128

Resources:
  # ─── Lambda Fetcher RSS + YouTube ───────────────────────────────
  FetcherFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: veille-fetcher
      CodeUri: ../apps/fetcher/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Environment:
        Variables:
          DB_PARAM_NAME: "/veille/database_url"
          YT_PARAM_NAME: "/veille/youtube_api_key"
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        ScheduledFetch:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Name: veille-fetch-schedule
            Enabled: true

  # ─── Lambda Gateway API (à venir) ───────────────────────────────
  GatewayFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      FunctionName: veille-gateway
      CodeUri: ../apps/gateway/
      Handler: bootstrap
      Runtime: provided.al2023
      Architectures:
        - x86_64
      Environment:
        Variables:
          DB_PARAM_NAME: "/veille/database_url"
          GIN_MODE: "release"
      Policies:
        - SSMParameterReadPolicy:
            ParameterName: "veille/*"
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
